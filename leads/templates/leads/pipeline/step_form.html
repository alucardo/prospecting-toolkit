{% extends 'base.html' %}
{% block content %}

<div class="flex items-center gap-4 mb-6">
    <a href="{% url 'leads:pipeline_detail' pipeline.pk %}" class="btn btn-ghost btn-sm">← Wróć</a>
    <h1 class="text-2xl font-bold">{{ title }} — {{ pipeline.name }}</h1>
</div>

<div class="max-w-md">
    <div class="card bg-base-200">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="label"><span class="label-text">Nazwa kroku</span></label>
                        {{ form.name }}
                    </div>
                    <div>
                        <label class="label"><span class="label-text">Kolejność</span></label>
                        {{ form.order }}
                    </div>
                    <button type="submit" class="btn btn-primary">Zapisz</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
