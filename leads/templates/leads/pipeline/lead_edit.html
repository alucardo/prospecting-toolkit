{% extends 'base.html' %}
{% block content %}

<div class="flex items-center gap-4 mb-6">
    <a href="{% url 'leads:lead_detail' lead.pk %}" class="btn btn-ghost btn-sm">← Wróć</a>
    <h1 class="text-2xl font-bold">Edytuj pipeline — {{ lead.name }}</h1>
</div>

<div class="max-w-lg">
    <div class="card bg-base-200">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="label"><span class="label-text">Pipeline</span></label>
                        <input type="text" value="{{ entry.pipeline.name }}" class="input input-bordered w-full" disabled>
                    </div>
                    <div>
                        <label class="label"><span class="label-text">Przypisany handlowiec</span></label>
                        {{ form.assigned_to }}
                    </div>
                    <button type="submit" class="btn btn-primary">Zapisz</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
