{% extends 'base.html' %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
    <h1 class="text-2xl font-bold">Mój profil kontaktowy</h1>
</div>

<form method="post" enctype="multipart/form-data" class="flex flex-col gap-6 max-w-xl">
    {% csrf_token %}

    <div class="card bg-base-200">
        <div class="card-body flex flex-col gap-4">

            {% if contact.photo %}
            <div>
                <img src="{{ contact.photo.url }}" class="w-24 h-24 rounded-full object-cover">
            </div>
            {% endif %}

            <div class="form-control">
                <label class="label"><span class="label-text">Zdjęcie</span></label>
                <input type="file" name="photo" accept="image/*" class="file-input file-input-bordered">
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text">Imię i nazwisko</span></label>
                <input type="text" name="full_name" value="{{ contact.full_name }}" class="input input-bordered">
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text">Stanowisko</span></label>
                <input type="text" name="position" value="{{ contact.position }}" class="input input-bordered" placeholder="np. Specjalista Google Business Profile">
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text">Telefon</span></label>
                <input type="text" name="phone" value="{{ contact.phone }}" class="input input-bordered">
            </div>

            <div class="form-control">
                <label class="label"><span class="label-text">Email</span></label>
                <input type="text" name="email" value="{{ contact.email }}" class="input input-bordered">
            </div>

        </div>
    </div>

    <div>
        <button type="submit" class="btn btn-primary">💾 Zapisz</button>
    </div>
</form>
{% endblock %}
