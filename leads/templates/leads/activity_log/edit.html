{% extends 'base.html' %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
    <a href="{% url 'leads:activity_log_index' lead.pk %}" class="btn btn-ghost btn-sm">← Wróć</a>
    <h1 class="text-2xl font-bold">Edytuj wpis</h1>
    <span class="text-gray-500">{{ lead.name }}</span>
</div>

<div class="max-w-lg">
    <div class="card bg-base-200">
        <div class="card-body">
            <form method="post" class="flex flex-col gap-3">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">{{ field.label }}{% if field.field.required %} *{% endif %}</span>
                    </label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-error text-sm mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary flex-1">Zapisz</button>
                    <a href="{% url 'leads:activity_log_index' lead.pk %}" class="btn btn-ghost flex-1">Anuluj</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
