{% extends 'base.html' %}
{% block content %}
<div class="flex items-center gap-4 mb-6">
    <a href="{% url 'leads:blueprint_index' %}" class="btn btn-ghost btn-sm">← Szablony</a>
    <h1 class="text-2xl font-bold">
        {% if blueprint %}Edytuj szablon{% else %}Nowy szablon{% endif %}
    </h1>
</div>

<div class="max-w-lg">
    <form method="post" class="card bg-base-200">
        <div class="card-body flex flex-col gap-4">
            {% csrf_token %}
            <div class="form-control">
                <label class="label"><span class="label-text">Nazwa szablonu *</span></label>
                <input type="text" name="name" class="input input-bordered w-full"
                       value="{{ blueprint.name|default:'' }}"
                       placeholder="np. Start współpracy, Miesięczna rutyna" required autofocus>
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text">Opis <span class="text-gray-400">(opcjonalny)</span></span></label>
                <textarea name="description" class="textarea textarea-bordered w-full" rows="2"
                          placeholder="np. Stosuj przy pierwszym miesiącu współpracy">{{ blueprint.description|default:'' }}</textarea>
            </div>
            <div class="flex gap-2 pt-2">
                <button type="submit" class="btn btn-primary">Zapisz</button>
                <a href="{% url 'leads:blueprint_index' %}" class="btn btn-ghost">Anuluj</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
