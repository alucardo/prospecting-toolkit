{% extends 'base.html' %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
    <a href="{% url 'knowledge:video_index' %}" class="btn btn-ghost btn-sm">← Inspiracje wideo</a>
    <h1 class="text-2xl font-bold">{% if video %}Edytuj inspirację{% else %}Nowa inspiracja{% endif %}</h1>
</div>

<div class="max-w-2xl">
    <form method="post" class="flex flex-col gap-4">
        {% csrf_token %}

        <div class="form-control">
            <label class="label py-1"><span class="label-text text-sm font-medium">Tytuł *</span></label>
            <input type="text" name="title"
                value="{% if video %}{{ video.title }}{% endif %}"
                class="input input-bordered w-full"
                placeholder="np. Śmieszna rolka restauracji w stylu POV"
                required>
        </div>

        <div class="form-control">
            <label class="label py-1"><span class="label-text text-sm font-medium">Link do Google Drive *</span></label>
            <input type="url" name="drive_url"
                value="{% if video %}{{ video.drive_url }}{% endif %}"
                id="drive-url-input"
                class="input input-bordered w-full"
                placeholder="https://drive.google.com/file/d/..."
                oninput="updatePreview(this.value)"
                required>
            {# Podgląd wideo #}
            <div id="drive-preview" class="mt-3 hidden">
                <div class="aspect-video bg-black rounded-box overflow-hidden">
                    <iframe id="drive-iframe" src=""
                        width="100%" height="100%"
                        allow="autoplay" allowfullscreen
                        class="w-full h-full">
                    </iframe>
                </div>
            </div>
        </div>

        <div class="form-control">
            <label class="label py-1"><span class="label-text text-sm font-medium">Opis / przemyślenia</span></label>
            <textarea name="description" rows="4"
                class="textarea textarea-bordered w-full"
                placeholder="Co cię zainspirowało, jakie elementy warto przenieść, dla jakiego klienta...">{% if video %}{{ video.description }}{% endif %}</textarea>
        </div>

        <div class="form-control">
            <label class="label py-1"><span class="label-text text-sm font-medium">Tagi</span></label>
            {% if tags %}
            <div class="flex flex-wrap gap-2">
                {% for tag in tags %}
                <label class="cursor-pointer">
                    <input type="checkbox" name="tags" value="{{ tag.pk }}" class="hidden peer"
                        {% if video and tag in video.tags.all %}checked{% endif %}>
                    <span class="badge badge-lg peer-checked:badge-primary badge-ghost cursor-pointer">
                        {{ tag.name }}
                    </span>
                </label>
                {% endfor %}
            </div>
            {% else %}
            <p class="text-sm text-gray-400">
                Brak tagów —
                <a href="{% url 'knowledge:tag_index' %}" class="link">utwórz tagi</a>
            </p>
            {% endif %}
        </div>

        <div class="flex gap-3 mt-2">
            <button type="submit" class="btn btn-primary">
                {% if video %}Zapisz zmiany{% else %}Dodaj inspirację{% endif %}
            </button>
            <a href="{% url 'knowledge:video_index' %}" class="btn btn-ghost">Anuluj</a>
        </div>
    </form>
</div>

<script>
// Podgląd wideo po wpisaniu linku
function updatePreview(url) {
    const preview = document.getElementById('drive-preview');
    const iframe = document.getElementById('drive-iframe');
    const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (match) {
        iframe.src = 'https://drive.google.com/file/d/' + match[1] + '/preview';
        preview.classList.remove('hidden');
    } else {
        iframe.src = '';
        preview.classList.add('hidden');
    }
}

// Pokaż podgląd jeśli edytujemy istniejące wideo
{% if video and video.drive_preview_url %}
updatePreview('{{ video.drive_url }}');
{% endif %}
</script>
{% endblock %}
