{% extends 'base.html' %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
    <h1 class="text-2xl font-bold">⚙️ Ustawienia — Baza wiedzy</h1>
</div>

<div class="max-w-lg">
    <form method="post" class="card bg-base-200">
        {% csrf_token %}
        <div class="card-body flex flex-col gap-4">

            <div class="form-control">
                <label class="label">
                    <span class="label-text font-medium">📁 Folder wideo na Google Drive</span>
                </label>
                <input type="url" name="video_folder_url"
                    value="{{ settings.video_folder_url }}"
                    class="input input-bordered w-full"
                    placeholder="https://drive.google.com/drive/folders/...">
                <label class="label">
                    <span class="label-text-alt text-gray-400">Pojawi się jako skrót w formularzu dodawania inspiracji</span>
                </label>
            </div>

            <div class="divider text-xs">Narzędzia do pobierania</div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text font-medium">🎵 Program do pobierania TikTok</span>
                </label>
                <input type="url" name="tiktok_downloader_url"
                    value="{{ settings.tiktok_downloader_url }}"
                    class="input input-bordered w-full"
                    placeholder="https://...">
                <label class="label">
                    <span class="label-text-alt text-gray-400">Link do aplikacji/strony do pobierania wideo z TikTok</span>
                </label>
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text font-medium">📸 Program do pobierania Instagram</span>
                </label>
                <input type="url" name="instagram_downloader_url"
                    value="{{ settings.instagram_downloader_url }}"
                    class="input input-bordered w-full"
                    placeholder="https://...">
                <label class="label">
                    <span class="label-text-alt text-gray-400">Link do aplikacji/strony do pobierania wideo z Instagrama</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary">Zapisz ustawienia</button>
        </div>
    </form>
</div>
{% endblock %}
